<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<title>かいつぶりベーカリーへようこそ</title>
	<!--font設定-->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&display=swap" rel="stylesheet">
	
	<!--font awesome設定-->
	<script src="https://kit.fontawesome.com/41e2a879d3.js" crossorigin="anonymous"></script>
	
	<!--favcon設定-->
	<link rel="icon" href="images/bread-fav.svg" type="image/svg+xml">
	
	<!--normalize.css-->
	<link rel="stylesheet" href="stylesheets/normalize.css">
	
	<!--基本style-->
	<link rel="stylesheet" href="stylesheets/style.css">

	<!--スマホ -->
	<link rel="stylesheet"
	      href="stylesheets/style-mobile.css"
		  media="screen and (max-width: 767px)">

	<!--タブレット・PC -->
	<link rel="stylesheet"
	      href="stylesheets/style-laptop.css"
		  media="screen and (min-width: 768px)">
	
</head>
<body>
	<header class="header">
		<div class="header-logo" id="home">
			かいつぶりベーカリー
		</div>
		<div class="header-nav">
			<ul class="header-nav-list">
				<li class="header-nav-list-item"><a href="#home">TOP</a>
				</li>
				<li class="header-nav-list-item"><a href="#menu">MENU</a>
				</li>
				<li class="header-nav-list-item"><a href="#map">MAP</a>
				</li>
				<li class="header-nav-list-item"><a href="#contact">CONTACT</a>
				</li>
			</ul>
		</div>
		
	</header>
	<main class="main">
		<div class="container">
			<section class="main-hero">
				<figure class="main-hero-pic">
					<img src="images/hardbreads-s.png" alt="パン一覧">
				</figure>
			</section>
			<section class="main-concept">
				！！このサイトはダミーです！！<br>
				！！このサイトはダミーです！！<br>
				比良の澄んだ天然水と、滋賀県産小麦「ゆめちから」。
				素材の恵みを生かした生地を、毎朝石窯でじっくり焼き上げています。
			</section>
			<section class="main-menu">
				<div class="main-menu-container" id="menu">
					おしながき（季節によって変わります）
				</div>
				<ul class="main-menu-list">
					<li class="main-menu-list-item">
						当店名物　かいつぶりパン
					</li>
					<li class="main-menu-list-item">
						バゲット
					</li>
					<li class="main-menu-list-item">
						セサミパン
					</li>
					<li class="main-menu-list-item">
						あんぱん
					</li>
					<li class="main-menu-list-item">
						クロワッサン
					</li>
					<li class="main-menu-list-item">
						
					</li>
				</ul>
				
			</section>
		</div>	
		<div class="container">
			<section class="main-access" id="map">
				当店へのアクセス
			</section>
			<section class="main-map">
				<iframe src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d13069.
				98121160074!2d135.85802867274168!3d35.019337005982685!3m2!1i1024!2i768!4f13.
				1!5e0!3m2!1sja!2sjp!4v1771732927328!5m2!1sja!2sjp" 
				style="border:0;" allowfullscreen="" loading="lazy" 
				referrerpolicy="no-referrer-when-downgrade"></iframe>
			</section>
		</div>
	</main>
	<footer class="footer">
		<div class="footer-info" id="contact">
			
		</div>
		<div class="footer-logo">
			<i class="fa-solid fa-house"></i>
			<i class="fa-brands fa-instagram"></i>
			<i class="fa-brands fa-facebook"></i>
			<i class="fa-solid fa-x"></i>
			
		</div>
		
	</footer>
</body>
</html>
